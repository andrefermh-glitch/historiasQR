<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventuras Interactivas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header con logo -->
        <header class="header">
            <svg viewBox="0 0 420 118" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aventuras Interactivas" style="max-width:420px;width:100%;display:block;margin:0 auto;">
                <defs>
                    <linearGradient id="gMain" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#6366f1"/>
                        <stop offset="55%" stop-color="#8b5cf6"/>
                        <stop offset="100%" stop-color="#ec4899"/>
                    </linearGradient>
                    <linearGradient id="gBook" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#8b5cf6"/>
                        <stop offset="100%" stop-color="#ec4899"/>
                    </linearGradient>
                </defs>

                <!-- Open book: left page -->
                <path d="M14,22 C14,19 16,17 19,17 L55,21 L55,91 L19,87 C16,87 14,85 14,82 Z" fill="url(#gBook)" opacity="0.88"/>
                <!-- Open book: right page -->
                <path d="M59,21 L95,17 C98,17 100,19 100,22 L100,82 C100,85 98,87 95,87 L59,91 Z" fill="url(#gMain)" opacity="0.88"/>
                <!-- Spine -->
                <rect x="54" y="17" width="6" height="74" rx="3" fill="#4338ca"/>
                <!-- Page lines left -->
                <line x1="21" y1="35" x2="51" y2="37" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
                <line x1="21" y1="47" x2="51" y2="49" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
                <line x1="21" y1="59" x2="51" y2="61" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
                <line x1="21" y1="71" x2="51" y2="73" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
                <!-- Page lines right -->
                <line x1="63" y1="37" x2="93" y2="35" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
                <line x1="63" y1="49" x2="93" y2="47" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
                <line x1="63" y1="61" x2="93" y2="59" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
                <line x1="63" y1="73" x2="93" y2="71" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

                <!-- Star on spine -->
                <polygon points="57,5 59.5,11 66,11 61,15 63,21 57,17 51,21 53,15 48,11 54.5,11" fill="#fbbf24"/>
                <polygon points="57,7 58.8,12 64,12 59.8,15.2 61.4,20 57,17.2 52.6,20 54.2,15.2 50,12 55.2,12" fill="#fde68a"/>

                <!-- Decorative sparkles -->
                <circle cx="108" cy="24" r="3" fill="#ec4899" opacity="0.55"/>
                <circle cx="12" cy="60" r="2.5" fill="#8b5cf6" opacity="0.45"/>
                <circle cx="111" cy="78" r="2" fill="#6366f1" opacity="0.4"/>
                <circle cx="108" cy="51" r="1.5" fill="#fbbf24" opacity="0.6"/>

                <!-- AVENTURAS -->
                <text x="124" y="56"
                    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
                    font-size="38" font-weight="800" fill="url(#gMain)" letter-spacing="-1">AVENTURAS</text>

                <!-- INTERACTIVAS -->
                <text x="127" y="80"
                    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
                    font-size="19" font-weight="500" fill="#6366f1" letter-spacing="5.5">INTERACTIVAS</text>

                <!-- Accent line -->
                <rect x="126" y="90" width="282" height="2" rx="1" fill="url(#gMain)" opacity="0.25"/>

                <!-- Slogan -->
                <text x="128" y="110"
                    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
                    font-size="12" fill="#9ca3af" font-style="italic" letter-spacing="0.8">lee · crea tu historia · escribe</text>
            </svg>
        </header>

        <!-- Pantalla de inicio: Formulario de entrada -->
        <div id="welcomeScreen" class="screen active">
            <div class="welcome-card">
                <h2>¡Hola! Bienvenido a tu aventura</h2>
                <p>Cuéntanos un poco sobre ti para personalizar tu historia</p>
                
                <form id="userForm">
                    <!-- Nombre -->
                    <div class="form-group">
                        <label for="userName">¿Cuál es tu nombre?</label>
                        <input 
                            type="text" 
                            id="userName" 
                            placeholder="Tu nombre aquí..." 
                            required
                            maxlength="20"
                        >
                    </div>

                    <!-- Edad -->
                    <div class="form-group">
                        <label for="userAge">¿Cuántos años tienes?</label>
                        <select id="userAge" required>
                            <option value="">Selecciona tu edad</option>
                            <option value="7-9">7 a 9 años</option>
                            <option value="10-12">10 a 12 años</option>
                            <option value="13-15">13 a 15 años</option>
                        </select>
                    </div>

                    <!-- Tema de historia -->
                    <div class="form-group">
                        <label for="storyTopic">¿Qué tipo de historia te atrae?</label>
                        <select id="storyTopic" required>
                            <option value="">Selecciona un tema</option>
                            <option value="Superhéroes">Superhéroes</option>
                            <option value="Aventura Fantástica">Aventura Fantástica</option>
                            <option value="Misterio">Misterio</option>
                            <option value="Explorador Espacial">Explorador Espacial</option>
                            <option value="Animales y Naturaleza">Animales y Naturaleza</option>
                            <option value="Escuela Mágica">Escuela Mágica</option>
                            <option value="Aventura Pirata">Aventura Pirata</option>
                            <option value="Viajero del Tiempo">Viajero del Tiempo</option>
                            <option value="Mundo de Videojuegos">Mundo de Videojuegos</option>
                            <option value="Explorador Submarino">Explorador Submarino</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">¡Comenzar mi Aventura!</button>
                </form>
            </div>
        </div>

        <!-- Pantalla de historia -->
        <div id="storyScreen" class="screen">
            <div class="story-container">
                <!-- Título de la historia -->
                <div class="story-header">
                    <h2 id="storyTitle"></h2>
                    <p id="storyTopic" class="topic-badge"></p>
                </div>

                <!-- Texto de la historia -->
                <div id="storyText" class="story-text"></div>

                <!-- Ilustración del paso actual -->
                <div id="storyIllustration" class="story-illustration"></div>

                <!-- Pregunta de decisión -->
                <div id="questionText" class="question-text"></div>

                <!-- Botones de decisión -->
                <div id="choicesContainer" class="choices-container">
                    <button id="choiceA" class="btn btn-choice"></button>
                    <button id="choiceB" class="btn btn-choice"></button>
                </div>

                <!-- Botones de control -->
                <div class="story-controls">
                    <button id="restartBtn" class="btn btn-secondary">Leer otra Historia</button>
                    <button id="shareBtn" class="btn btn-secondary">Compartir</button>
                </div>
            </div>
        </div>

        <!-- Pantalla de fin -->
        <div id="endScreen" class="screen">
            <div class="end-card">
                <h2 id="endingTitle"></h2>
                <div id="storyAnimation" class="story-animation"></div>
                <p id="endingText" class="ending-text"></p>
                
                <div class="end-stats">
                    <div class="stat">
                        <span class="stat-label">Decisiones acertadas:</span>
                        <span class="stat-value" id="decisionsCount"></span>
                    </div>
                </div>

                <div class="end-buttons">
                    <button id="playAgainBtn" class="btn btn-primary">Leer otra Historia</button>
                    <button id="differentStoryBtn" class="btn btn-secondary">Elegir diferente Tema</button>
                </div>
            </div>
        </div>
    </div>

    <script src="storyIllustrations.js"></script>
    <script src="app.js"></script>
</body>
</html>
